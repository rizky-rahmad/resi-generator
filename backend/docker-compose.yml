version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: resi_generator_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resi_generator_backend
    restart: unless-stopped
    ports:
      - "${APP_PORT}:8080"
    environment:
      APP_PORT: 8080
      APP_ENV: production
      DB_HOST: db         
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

  
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: resi_generator_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${APP_PORT}/api
    depends_on:
      - backend

  
  newman:
    image: postman/newman:alpine
    container_name: resi_generator_test
    volumes:
      - ./tests:/etc/newman
    command: run api-test.json --delay-request 500
    depends_on:
      backend:
        condition: service_started
    profiles:
      - test  # hanya jalan kalau dipanggil dengan --profile test


volumes:
  postgres_data:
    driver: local